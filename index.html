<!DOCTYPE html>
<html>
<head>
    <title>A Very Important Question ❤️</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            text-align: center;
            font-family: Arial, sans-serif;
            background: #ffdde1;
        }

        h1 {
            margin-top: 80px;
        }

        .buttons {
            margin-top: 30px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
        }

        .yes {
            background-color: #ff4b5c;
            color: white;
        }

        .no {
            background-color: black;
            color: white;
            position: absolute;
        }

        .cat {
            width: 200px;
            margin-top: 20px;
        }

        .heart {
            position: fixed;
            bottom: -10px;
            font-size: 20px;
            animation: floatUp 5s linear infinite;
            color: red;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<h1>Will you go on a date with me? ❤️</h1>

<img class="cat" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif">

<div class="buttons">
    <button class="yes" onclick="location.href='yes.html'">Yes ❤️</button>
    <button class="no" id="noBtn">No</button>
</div>

<script>
    const noBtn = document.getElementById("noBtn");

    noBtn.addEventListener("mouseover", function() {
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight;
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
